<!DOCTYPE html>
<html>
<head>
<title>Taza Sabzi</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
}

.title{
text-align:center;
font-size:30px;
margin:30px;
}

.products{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.card{
background:white;
padding:20px;
width:220px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.price-old{
text-decoration:line-through;
color:gray;
}

.price-new{
color:green;
font-weight:bold;
}

button{
background:#0f9d58;
color:white;
border:none;
padding:10px;
width:100%;
margin-top:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0b7d45;
}

</style>
</head>

<body>

<div class="title">Deal Of The Month</div>

<div class="products">

<div class="card">
<img src="https://i.imgur.com/W7Z8K8E.png">
<h4>Normal Mirchi (सामान्य मिर्ची)</h4>
<p><span class="price-old">₹30</span> <span class="price-new">₹15</span></p>
<p>250gm</p>
<button>ADD TO CART</button>
</div>

<div class="card">
<img src="https://i.imgur.com/3Q0hKpK.png">
<h4>Dhaniya (धनिया)</h4>
<p><span class="price-old">₹30</span> <span class="price-new">₹20</span></p>
<p>1 bundle</p>
<button>ADD TO CART</button>
</div>

<div class="card">
<img src="https://i.imgur.com/AtXH4pK.png">
<h4>Kathel</h4>
<p><span class="price-old">₹50</span> <span class="price-new">₹20</span></p>
<p>500gm</p>
<button>ADD TO CART</button>
</div>

<div class="card">
<img src="https://i.imgur.com/8X9Q2QH.png">
<h4>Pyaj (प्याज)</h4>
<p><span class="price-old">₹40</span> <span class="price-new">₹25</span></p>
<p>1kg</p>
<button>ADD TO CART</button>
</div>

</div>

</body>
</html>
